# Market chat prefix — supports & color codes
prefix: "&2&l[&a&lMarket&2&l] &a"
join-message: "&eHello there! %player%"

# Allow players to fly within the market world
allow-flight: true

# Market world protection settings
protection:
  # Prevent all player damage (fall, mobs, void, etc.)
  prevent-damage: true
  # Prevent hunger loss
  prevent-hunger: true
  # Prevent natural mob spawning
  prevent-mob-spawn: true

market-world:
  name: "market"
  plot-size: 16
  pathway-width: 3
  floor-material: "GRASS_BLOCK"
  pathway-material: "STONE_BRICKS"
  border-material: "SMOOTH_STONE_SLAB"